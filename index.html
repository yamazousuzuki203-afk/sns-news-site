<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダークジャーナリズム専門ニュース</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: #1e1e1e;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid #ff3333;
        }
        header h1 {
            color: #ff3333;
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
        }
        header p {
            color: #888;
            margin: 10px 0 0 0;
            font-size: 14px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        /* GASから自動挿入される記事ブロックの調整 */
        .post-item {
            background-color: #1e1e1e;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #222;
            transition: background-color 0.2s;
        }
        .post-item:hover {
            background-color: #252525;
        }
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #555555;
            font-size: 12px;
            border-top: 1px solid #222;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ダークジャーナリズム専門ニュース</h1>
        <p>社会の深淵に潜む事件の真実を追う、全自動更新メディア</p>
    </header>

    <div class="container">
        <ul class="post-list">
</ul>
    </div>

    <footer>
        &copy; 2026 ダークジャーナリズム専門ニュース All Rights Reserved.
    </footer>

</body>
</html>
