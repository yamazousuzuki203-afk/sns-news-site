<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNSトレンドニュース速報</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --accent-color: #ff4500; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #fff; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; font-size: 24px; }
        .loading { text-align: center; font-size: 16px; color: #aaa; margin-top: 50px; }
        .article-card { background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-left: 5px solid var(--accent-color); }
        .article-title { font-size: 18px; margin-top: 0; margin-bottom: 10px; color: #fff; font-weight: bold; }
        .article-meta { font-size: 12px; color: #888; margin-bottom: 15px; }
        .article-body { font-size: 15px; line-height: 1.7; white-space: pre-wrap; color: #ccc; }
        .video-prompt-box { background: #2a2a2a; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 15px; border: 1px dashed #444; }
        .video-prompt-title { font-weight: bold; color: var(--accent-color); margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ SNSトレンドニュース速報 (独自解説)</h1>
        <div id="news-container" class="loading">最新の独自記事を読み込み中...</div>
    </div>

    <script>
        const USER = "yamazousuzuki203-afk";
        const REPO = "sns-news-site";
        
        async function loadNews() {
            const container = document.getElementById('news-container');
            try {
                const listUrl = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
                const response = await fetch(listUrl);
                if (!response.ok) throw new Error('一覧の取得に失敗しました');
                const files = await response.json();

                // _0.json などの新しく自動生成されたファイルを最大15件抽出（新しい順）
                const jsonFiles = files
                    .filter(file => file.name.endsWith('.json') && file.name.includes('_'))
                    .reverse()
                    .slice(0, 15);

                if (jsonFiles.length === 0) {
                    container.innerHTML = '<div style="text-align:center;">新着記事を準備中です。</div>';
                    container.classList.remove('loading');
                    return;
                }

                container.innerHTML = ''; 

                for (const file of jsonFiles) {
                    try {
                        const fileRes = await fetch(file.download_url);
                        const article = await fileRes.json();

                        // ★どんなデータ名で入っていても強引に見つけ出す超万能ロジック
                        let displayTitle = article.title || article.headline || article.news_title;
                        let displayBody = article.content || article.body || article.article || article.text || article.main_text;
                        let displayPrompt = article.video_prompt || article.prompt || article.image_prompt;

                        // 万が一データが深い階層（オブジェクト型）になっていた場合の救済
                        if (typeof article.article === 'object' && article.article !== null) {
                            displayTitle = displayTitle || article.article.title || article.article.headline;
                            displayBody = displayBody || article.article.body || article.article.content;
                            displayPrompt = displayPrompt || article.article.video_prompt;
                        }

                        // それでも見つからない場合の最終手段
                        if (!displayTitle || !displayBody) {
                            const values = Object.values(article);
                            displayTitle = displayTitle || values[0] || "【ニュース速報】";
                            displayBody = displayBody || values[1] || "本文を自動解析中...";
                        }

                        const postDate = article.date ? new Date(article.date).toLocaleString('ja-JP') : '最新時事解説';

                        const card = document.createElement('div');
                        card.className = 'article-card';
                        card.innerHTML = `
                            <div class="article-title">${displayTitle}</div>
                            <div class="article-meta">配信: ${postDate}</div>
                            <div class="article-body">${displayBody}</div>
                            <div class="video-prompt-box">
                                <div class="video-prompt-title">🎬 動画生成イメージ</div>
                                <code style="color: #00ff66;">${displayPrompt || 'プロンプト作成中'}</code>
                            </div>
                        `;
                        container.appendChild(card);
                    } catch (e) {
                        console.error('ファイル読み込みスキップ:', e);
                    }
                }
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; color:red;">エラーが発生しました: ${error.message}</div>`;
            }
        }
        loadNews();
    </script>
</body>
</html>
