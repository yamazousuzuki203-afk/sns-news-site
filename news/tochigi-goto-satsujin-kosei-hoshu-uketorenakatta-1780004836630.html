<html><body><h1>栃木強盗殺人、実行役の高校生「数百万円の報酬もらえる予定だった」…実際は受け取れなかったか - 読売新聞</h1><p>栃木県で発生した強盗殺人事件において、実行役の一人とされる高校生が捜査に対し、「数百万円の報酬がもらえる予定だった」と供述していることが報じられました。しかし、この供述から、実際にはこの報酬を受け取れていなかった可能性が浮上しています。事件の背景には報酬を巡るトラブルや、計画性があるものと見られています。捜査当局は事件の全容解明に向けて、報酬の行方や関与者の特定を進めています。</p><a href="../index.html">戻る</a></body></html>
