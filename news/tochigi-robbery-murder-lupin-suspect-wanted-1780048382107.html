<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>強盗殺人容疑で48歳男を公開手配 「ルパンやる?」事件持ちかけか [栃木県]</title></head><body style="background-color:#121212; color:#e0e0e0; padding:20px;"><h1>強盗殺人容疑で48歳男を公開手配 「ルパンやる?」事件持ちかけか [栃木県]</h1><p style="white-space:pre-wrap;">栃木県で発生した強盗殺人事件に関連し、警察は48歳の男を容疑者として全国に公開手配しました。男は事件を持ちかける際に「ルパンやる？」といった言葉を使用していたとされ、その特異な手口が捜査関係者の間で注目を集めています。事件は栃木県内で発生し、警察は男の顔写真や特徴を公開し、情報提供を呼びかけています。現在も容疑者は逃走中とみられており、周辺住民には警戒が促されています。警察は、事件解決に向けた市民からの積極的な情報提供を求めています。</p><a href="../index.html" style="color:#ff6666;">← 戻る</a></body></html>
