<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>栃木 強盗殺人容疑で48歳男を公開手配 「ルパンやる？」と犯行持ちかけか</title></head><body style="background-color:#121212; color:#e0e0e0; padding:20px;"><h1>栃木 強盗殺人容疑で48歳男を公開手配 「ルパンやる？」と犯行持ちかけか</h1><p style="white-space:pre-wrap;">朝日新聞の報道によると、栃木県内で発生した強盗殺人事件に関連し、48歳の男が全国に公開手配されました。この男は犯行に際し、他者に対し「ルパンやる？」と声をかけ、事件を持ちかけた疑いが持たれています。警察は男の行方を追っており、情報提供を呼びかけています。</p><a href="../index.html" style="color:#ff6666;">← 戻る</a></body></html>
